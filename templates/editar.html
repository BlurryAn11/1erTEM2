{% extends 'base.html' %}

{% block contenido %}

<h2>Editar Producto</h2>

<form method="POST">
    <input name="nombre" value="{{ producto.nombre }}" class="form-control mb-2">
    <input name="categoria" value="{{ producto.categoria }}" class="form-control mb-2">
    <input name="precio" value="{{ producto.precio }}" class="form-control mb-2">
    <input name="stock" value="{{ producto.stock }}" class="form-control mb-2">

    <button class="btn btn-warning">Actualizar</button>
</form>

{% endblock %}
