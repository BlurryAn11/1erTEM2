<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CompuSpace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
        }

        .navbar {
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        table {
            background: white;
            color: black;
        }

        .titulo-logo {
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
            border-radius: 50%;
        }
    </style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">

         <img src="{{ url_for('static', filename='img/LOGO.png') }}" 
             alt="Logo"
             width="50"
             class="me-2">

        <span class="navbar-brand titulo-logo">COMPU SPACE</span>
    </div>
</nav>

<div class="container mt-4">
    {% block contenido %}{% endblock %}
</div>

</body>
</html>
